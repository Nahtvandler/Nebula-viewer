services:
  backend:
    build: ./backend
    container_name: nebula-viewer-backend
    restart: unless-stopped
    environment:
      NEBULA_HOST: ${NEBULA_HOST:-nebula-graphd}
      NEBULA_PORT: ${NEBULA_PORT:-9669}
      NEBULA_USER: ${NEBULA_USER:-root}
      NEBULA_PASSWORD: ${NEBULA_PASSWORD:-nebula}
      NEBULA_SPACE: ${NEBULA_SPACE:-rsm_graph_poc}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    ports:
      # Открыт для отладки; фронт всё равно ходит через nginx-прокси.
      # 8010 на хосте, т.к. 8000 может быть занят (напр. rsm-knowledge-mcp).
      - "${BACKEND_PORT:-8010}:8000"

  frontend:
    build: ./frontend
    container_name: nebula-viewer-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8080}:80"

# Подключаемся к уже существующей сети NebulaGraph из rsm-extractor,
# чтобы backend видел контейнер nebula-graphd по имени.
# Переопределяется через NEBULA_NETWORK в .env.
networks:
  default:
    name: ${NEBULA_NETWORK:-rsm-extractor_default}
    external: true
