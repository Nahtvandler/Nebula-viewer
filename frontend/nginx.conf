server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # index.html никогда не кэшируем — иначе после пересборки браузер держит
    # ссылку на старый бандл. Ассеты с хэшем в имени можно кэшировать надолго.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri /index.html;
    }

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA-роутинг: всё, что не файл, отдаём index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Проксируем API на backend внутри compose-сети
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}
